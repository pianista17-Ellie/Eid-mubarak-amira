<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #043562;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

/* ✨ estrellas cayendo */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-repeat: repeat;
}

body::before {
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.5;
    animation: starsFall 20s linear infinite;
}

body::after {
    background-image: radial-gradient(white 2px, transparent 2px);
    background-size: 70px 70px;
    opacity: 0.3;
    animation: starsFall 40s linear infinite;
}

@keyframes starsFall {
    from { transform: translateY(-100px); }
    to { transform: translateY(200px); }
}

/* 🏮 faroles */
.lantern {
    position: absolute;
    top: -20px;
    transform-origin: top center;
    animation: swing 4s ease-in-out infinite;
}

.l1 { left: 15%; width: 80px; animation-delay: 0s; }
.l2 { left: 35%; width: 60px; animation-delay: 1s; }
.l3 { left: 60%; width: 75px; animation-delay: 2s; }
.l4 { left: 80%; width: 65px; animation-delay: 1.5s; }

@keyframes swing {
    0%,100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
}

/* 🕌 marco */
.frame {
    position: relative;
    width: 85vw;
    max-width: 380px;
    animation: fadeIn 2s ease;
}

/* 🌙 luna */
.moon {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    animation: float 3s ease-in-out infinite;
}

/* texto centrado */
.text {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    width: 90%;
}

.text h1 {
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 2px;
}

/* animaciones */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes float {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -10px); }
}

/* 🎵 botón música */
.music-btn {
    position: absolute;
    bottom: 20px;
    background: white;
    color: #043562;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- 🏮 faroles -->
<img src="farol.png" class="lantern l1">
<img src="farol.png" class="lantern l2">
<img src="farol.png" class="lantern l3">
<img src="farol.png" class="lantern l4">

<!-- 🕌 contenido -->
<div class="frame">
    <img src="marco.png" width="100%">
    
    <img src="luna.png" class="moon">

    <div class="text">
        <h1>EID MUBARAK AMIRA</h1>
    </div>
</div>

<!-- 🎵 música -->
<audio id="music" src="musica.mp3"></audio>
<button class="music-btn" onclick="playMusic()">🎵 Tap para música</button>

<script>
function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
