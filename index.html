<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #043562;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

/* ✨ estrellas (varias capas para realismo) */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-repeat: repeat;
    animation: moveStars 60s linear infinite;
}

body::before {
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
}

body::after {
    background-image: radial-gradient(white 2px, transparent 2px);
    background-size: 80px 80px;
    opacity: 0.2;
    animation-duration: 120s;
}

@keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-200px); }
}

/* 🏮 faroles */
.lantern {
    position: absolute;
    top: -20px;
    width: 70px;
    transform-origin: top center;
    animation: swing 4s ease-in-out infinite;
}

/* posiciones tipo imagen */
.l1 { left: 15%; width: 80px; animation-delay: 0s; }
.l2 { left: 35%; width: 60px; animation-delay: 1s; }
.l3 { left: 55%; width: 75px; animation-delay: 2s; }
.l4 { left: 75%; width: 65px; animation-delay: 1.5s; }

@keyframes swing {
    0%,100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
}

/* 🕌 marco */
.frame {
    position: relative;
    width: 85vw;
    max-width: 400px;
    animation: fadeIn 2s ease;
}

/* 🌙 luna */
.moon {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    animation: float 3s ease-in-out infinite;
}

/* texto */
.text {
    position: absolute;
    top: 58%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    letter-spacing: 3px;
}

.text h1 {
    font-weight: 300;
    font-size: 26px;
}

/* animaciones */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes float {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -10px); }
}
</style>
</head>

<body>

<!-- 🏮 faroles -->
<img src="farol.png" class="lantern l1">
<img src="farol.png" class="lantern l2">
<img src="farol.png" class="lantern l3">
<img src="farol.png" class="lantern l4">

<!-- 🕌 contenido -->
<div class="frame">
    <img src="marco.png" width="100%">
    
    <img src="luna.png" class="moon">

    <div class="text">
        <h1>EID<br>MUBARAK</h1>
    </div>
</div>

</body>
</html>
